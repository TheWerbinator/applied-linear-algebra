name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/backend.yml"

jobs:
  test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type check (mypy)
        run: mypy src

      - name: Tests
        run: pytest --cov=applied_linear_algebra --cov=api --cov-report=term-missing

  deploy:
    name: Deploy to Fly.io
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-backend
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        working-directory: api
        run: flyctl deploy . --remote-only --config deploy/fly.toml --dockerfile deploy/Dockerfile --image-label commit-${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
