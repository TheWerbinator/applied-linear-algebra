name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/backend.yml"

defaults:
  run:
    working-directory: api

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type check (mypy)
        run: mypy src

      - name: Tests
        run: pytest --cov=applied_linear_algebra --cov=api --cov-report=term-missing
